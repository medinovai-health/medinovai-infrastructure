name: Reusable · Secret Scan

# ---------------------------------------------------------------------------
# Org-wide reusable secret-scanning workflow (v1, 2026-04-18)
#
# Maintainer: medinovai-infrastructure
# Usage:      every MedinovAI repo references this workflow from its own CI:
#
#   # .github/workflows/security.yml in the consumer repo
#   name: Security
#   on:
#     push:
#       branches: [ main ]
#     pull_request:
#       branches: [ main ]
#     schedule:
#       # Nightly full-history scan, in addition to per-PR incremental scan.
#       - cron: "0 5 * * *"
#
#   permissions:
#     contents: read
#     security-events: write  # needed for SARIF upload
#
#   jobs:
#     secrets:
#       uses: medinovai-health/medinovai-infrastructure/.github/workflows/secret-scan.yml@main
#       with:
#         # Optional: full history scan on schedule, incremental on PR.
#         fetch_depth: ${{ github.event_name == 'schedule' && 0 || 1 }}
#         # Optional: upload SARIF for GitHub code-scanning UI.
#         upload_sarif: true
#
# Runner note:
# medinovai-health has no ubuntu-latest entitlement (see
# medinovai-infrastructure#1), so every job pins to the self-hosted
# aifactory-medinovai runner (macOS / ARM64).
# ---------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      fetch_depth:
        description: "Git fetch depth. 0 = full history (scheduled full scan)."
        required: false
        type: number
        default: 1
      upload_sarif:
        description: "Upload SARIF to GitHub code-scanning. Requires security-events:write."
        required: false
        type: boolean
        default: false
      fail_on_findings:
        description: "Fail the job on new findings. Set to false to run in observe-only mode."
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: gitleaks
    runs-on: [self-hosted, aifactory]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.fetch_depth }}

      - name: Install gitleaks (pinned)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="8.18.4"
          ARCH="$(uname -m)"
          case "$ARCH" in
            arm64) PKG="darwin_arm64" ;;
            x86_64) PKG="darwin_x64" ;;
            *) echo "::error::unsupported arch $ARCH"; exit 1 ;;
          esac
          curl -fsSL -o /tmp/gitleaks.tgz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_${PKG}.tar.gz"
          mkdir -p "$RUNNER_TEMP/gl"
          tar -xzf /tmp/gitleaks.tgz -C "$RUNNER_TEMP/gl"
          "$RUNNER_TEMP/gl/gitleaks" version

      - name: Resolve config
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          if [ -f .gitleaks.toml ]; then
            echo "config=.gitleaks.toml" >> "$GITHUB_OUTPUT"
            echo "Using repo-local .gitleaks.toml"
          else
            # Fall back to the org-wide template shipped by this repo.
            curl -fsSL -o "$RUNNER_TEMP/gl/gitleaks.toml" \
              "https://raw.githubusercontent.com/medinovai-health/medinovai-infrastructure/main/templates/secret-hygiene/.gitleaks.toml.template"
            echo "config=$RUNNER_TEMP/gl/gitleaks.toml" >> "$GITHUB_OUTPUT"
            echo "Using org-wide default config (no .gitleaks.toml in repo)"
          fi

      - name: Run gitleaks
        id: scan
        shell: bash
        run: |
          set +e
          "$RUNNER_TEMP/gl/gitleaks" detect \
            --source . \
            --config "${{ steps.cfg.outputs.config }}" \
            --redact \
            --report-format sarif \
            --report-path "$RUNNER_TEMP/gl/gitleaks.sarif" \
            --no-banner \
            --exit-code 2
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          # 0 = no leaks; 2 = leaks found; anything else = error.
          if [ "$code" -ne 0 ] && [ "$code" -ne 2 ]; then
            echo "::error::gitleaks hard error ($code)"
            exit "$code"
          fi

      - name: Upload SARIF
        if: ${{ inputs.upload_sarif }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ runner.temp }}/gl/gitleaks.sarif
          category: gitleaks

      - name: Summarise
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          code="${{ steps.scan.outputs.exit_code }}"
          if [ "$code" = "0" ]; then
            echo "::notice::gitleaks found no secrets."
          else
            echo "::warning::gitleaks detected secret-like strings. See job log and SARIF (if enabled) for redacted details."
          fi
          if [ "$code" != "0" ] && [ "${{ inputs.fail_on_findings }}" = "true" ]; then
            exit 1
          fi

  detect-secrets:
    name: detect-secrets (baseline check)
    runs-on: [self-hosted, aifactory]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.fetch_depth }}

      - name: Resolve Python 3.12
        shell: bash
        run: |
          which python3.12 || brew list --versions python@3.12 || true
          python3.12 --version

      - name: Install detect-secrets (pinned)
        shell: bash
        run: |
          python3.12 -m venv "$RUNNER_TEMP/ds-venv"
          "$RUNNER_TEMP/ds-venv/bin/pip" install --upgrade pip
          "$RUNNER_TEMP/ds-venv/bin/pip" install "detect-secrets==1.5.0"

      - name: Scan
        id: scan
        shell: bash
        run: |
          set +e
          if [ -f .secrets.baseline ]; then
            "$RUNNER_TEMP/ds-venv/bin/detect-secrets" audit --report .secrets.baseline
            audit=$?
            "$RUNNER_TEMP/ds-venv/bin/detect-secrets" scan --baseline .secrets.baseline
            scan=$?
          else
            # No baseline yet: do a fresh scan and treat any finding as advisory
            # on the first run so teams can bootstrap without a hard failure.
            "$RUNNER_TEMP/ds-venv/bin/detect-secrets" scan > "$RUNNER_TEMP/ds.json"
            scan=$?
            audit=0
            echo "::notice::No .secrets.baseline yet. Commit the output of 'detect-secrets scan > .secrets.baseline' to your repo to enable enforcement."
          fi
          echo "scan=$scan" >> "$GITHUB_OUTPUT"
          echo "audit=$audit" >> "$GITHUB_OUTPUT"

      - name: Enforce
        if: ${{ inputs.fail_on_findings }}
        shell: bash
        run: |
          s="${{ steps.scan.outputs.scan }}"
          a="${{ steps.scan.outputs.audit }}"
          if [ "$s" != "0" ] || [ "$a" != "0" ]; then
            echo "::error::detect-secrets found unaudited findings (scan=$s audit=$a). Run 'detect-secrets audit .secrets.baseline' locally to review."
            exit 1
          fi
