# MedinovAI — Reusable AIFactory Deploy Workflow
# ─────────────────────────────────────────────────────────────────────────────
# Universal deployment template for ALL repos in the medinovai-health org.
# Runs on the self-hosted AIFactory runner (aifactory-medinovai, macOS ARM64).
# The runner IS the target machine — no SSH/Tailscale hops required.
#
# Usage in any repo:
#   jobs:
#     deploy:
#       uses: medinovai-health/medinovai-infrastructure/.github/workflows/deploy-to-aifactory.yml@main
#       with:
#         service_name: "My Service"
#         port: 8080
#       secrets: inherit
#
# @version 3.0.0  (self-hosted runner — no SSH/Tailscale)
# @compliance SOC2, HIPAA (no PHI in logs)
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to AIFactory

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Human-readable service name (e.g. "HealthLLM")'
        required: true
        type: string
      port:
        description: 'Service port on AIFactory host'
        required: false
        type: number
        default: 8080
      health_path:
        description: 'Health check path (e.g. /api/health or /health)'
        required: false
        type: string
        default: '/api/health'
      compose_file:
        description: 'docker-compose file name'
        required: false
        type: string
        default: 'docker-compose.yml'
      pre_deploy_cmd:
        description: 'Command to run before docker compose up'
        required: false
        type: string
        default: ''
      post_deploy_cmd:
        description: 'Command to run after successful deploy'
        required: false
        type: string
        default: ''
      timeout_seconds:
        description: 'Seconds to wait for health check'
        required: false
        type: number
        default: 120
      notify_vidur:
        description: 'Publish CloudEvent to Vidur on deploy'
        required: false
        type: boolean
        default: true
    secrets:
      GH_PAT:
        required: false
      # Legacy secrets — kept for backward-compat signature; not used on self-hosted runner
      AIFACTORY_SSH_HOST:
        required: false
      AIFACTORY_SSH_USER:
        required: false
      AIFACTORY_SSH_KEY:
        required: false
      AIFACTORY_DEPLOY_PATH:
        required: false
      TS_OAUTH_CLIENT_ID:
        required: false
      TS_OAUTH_CLIENT_SECRET:
        required: false

jobs:
  deploy:
    name: Deploy ${{ inputs.service_name }} → AIFactory
    runs-on: [self-hosted, aifactory]
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Build metadata ────────────────────────────────────────────────────
      - name: Set deploy variables
        id: vars
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      # ── 3. Write .env ────────────────────────────────────────────────────────
      - name: Write .env
        env:
          GH_PAT_VALUE: ${{ secrets.GH_PAT }}
        run: |
          cat > .env <<EOF
          GITHUB_PAT=${GH_PAT_VALUE}
          APP_VERSION=${{ github.ref_name }}-${{ steps.vars.outputs.short_sha }}
          BUILD_NUMBER=${{ github.run_number }}
          COMMIT_SHA=${{ github.sha }}
          ENVIRONMENT=production
          NODE_ENV=production
          NEXT_TELEMETRY_DISABLED=1
          AIFACTORY_HOST=100.106.54.9
          AGENT_LLM_BASE_URL=http://100.106.54.9:10100/v1
          AGENT_LLM_API_KEY=aifactory
          AGENT_LLM_MODEL=qwen2.5-coder:32b
          PORT=${{ inputs.port }}
          EOF

      # ── 4. Network + pre-deploy ──────────────────────────────────────────────
      - name: Ensure Docker network
        run: docker network create medinovai-net 2>/dev/null || true

      - name: Pre-deploy command
        if: inputs.pre_deploy_cmd != ''
        run: ${{ inputs.pre_deploy_cmd }}

      # ── 5. Build & deploy ────────────────────────────────────────────────────
      - name: Build and deploy
        run: |
          docker compose -f ${{ inputs.compose_file }} down --remove-orphans 2>/dev/null || true
          docker compose -f ${{ inputs.compose_file }} up -d --build --remove-orphans

      # ── 6. Post-deploy ───────────────────────────────────────────────────────
      - name: Post-deploy command
        if: inputs.post_deploy_cmd != ''
        run: ${{ inputs.post_deploy_cmd }}

      # ── 7. Health check (local — runner is on the same host) ─────────────────
      - name: Health check
        if: inputs.port > 0
        env:
          PORT: ${{ inputs.port }}
          HEALTH_PATH: ${{ inputs.health_path }}
          TIMEOUT: ${{ inputs.timeout_seconds }}
        run: |
          echo "Waiting for http://localhost:${PORT}${HEALTH_PATH} (timeout: ${TIMEOUT}s)..."
          ELAPSED=0
          INTERVAL=5
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 5 --max-time 10 \
              "http://localhost:${PORT}${HEALTH_PATH}" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Health check passed after ${ELAPSED}s"
              break
            fi
            echo "  HTTP ${STATUS} at ${ELAPSED}s — retrying in ${INTERVAL}s..."
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "WARNING: Health check timed out after ${TIMEOUT}s — service may still be starting."
          fi

      # ── 8. Notify Vidur ──────────────────────────────────────────────────────
      - name: Notify Vidur event bus
        if: inputs.notify_vidur
        continue-on-error: true
        run: |
          curl -s -X POST "http://100.106.54.9:37700/events" \
            -H "Content-Type: application/cloudevents+json" \
            -d "{
              \"specversion\": \"1.0\",
              \"type\": \"medinovai.deploy.completed\",
              \"source\": \"github.com/${{ github.repository }}\",
              \"id\": \"deploy-${{ github.run_id }}\",
              \"time\": \"${{ steps.vars.outputs.timestamp }}\",
              \"data\": {
                \"service\": \"${{ inputs.service_name }}\",
                \"repo\": \"${{ github.repository }}\",
                \"sha\": \"${{ steps.vars.outputs.short_sha }}\",
                \"status\": \"success\"
              }
            }" || true

      # ── 9. Summary ───────────────────────────────────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          echo "## Deploy: ${{ inputs.service_name }}" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`${{ steps.vars.outputs.short_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Port | ${{ inputs.port }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Runner | \`$(hostname)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | ${{ steps.vars.outputs.timestamp }} |" >> $GITHUB_STEP_SUMMARY
