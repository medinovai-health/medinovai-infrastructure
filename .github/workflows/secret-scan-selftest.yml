name: Secret-Scan · Self-Test

# ---------------------------------------------------------------------------
# Runs on every PR that touches the org-wide secret-scan ruleset. Asserts:
#
#   1. gitleaks + the kit's .gitleaks.toml.template DETECT each of the five
#      MedinovAI-specific leak patterns in tests/secret-scan-fixtures/.
#   2. gitleaks + the kit's .gitleaks.toml.template IGNORE the allowlist
#      fixture (REPLACE_ME / REDACTED_* / DO_NOT_USE_SERVER_SIDE_ONLY).
#
# If either assertion flips, any subsequent adoption PR is landing broken
# rules into 192+ repos. Fail the check, hold the line.
# ---------------------------------------------------------------------------

on:
  pull_request:
    paths:
      - 'templates/secret-hygiene/**'
      - '.github/workflows/secret-scan.yml'
      - '.github/workflows/secret-scan-selftest.yml'
      - 'tests/secret-scan-fixtures/**'

permissions:
  contents: read

jobs:
  selftest:
    name: Verify ruleset catches every MedinovAI leak shape
    runs-on: [self-hosted, aifactory]
    steps:
      - uses: actions/checkout@v4

      - name: Install gitleaks (pinned)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="8.18.4"
          ARCH="$(uname -m)"
          case "$ARCH" in
            arm64)  PKG="darwin_arm64" ;;
            x86_64) PKG="darwin_x64" ;;
            *) echo "::error::unsupported arch $ARCH"; exit 1 ;;
          esac
          curl -fsSL -o /tmp/gitleaks.tgz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_${PKG}.tar.gz"
          mkdir -p "$RUNNER_TEMP/gl"
          tar -xzf /tmp/gitleaks.tgz -C "$RUNNER_TEMP/gl"
          "$RUNNER_TEMP/gl/gitleaks" version

      - name: Assertion 1 — fixtures must trigger every MedinovAI rule
        shell: bash
        run: |
          set -euo pipefail
          GL="$RUNNER_TEMP/gl/gitleaks"
          CFG="templates/secret-hygiene/.gitleaks.toml.template"
          SCAN_DIR="tests/secret-scan-fixtures"

          # Run gitleaks over just the fixture directory, no-git mode, JSON.
          set +e
          "$GL" detect \
            --source "$SCAN_DIR" \
            --config "$CFG" \
            --no-git \
            --no-banner \
            --report-format json \
            --report-path "$RUNNER_TEMP/findings.json" \
            --redact \
            --exit-code 0
          set -e

          echo "--- findings.json ---"
          cat "$RUNNER_TEMP/findings.json"
          echo

          expected=(
            medinovai-openai-project-key
            medinovai-anthropic-key
            medinovai-next-public-secret
            medinovai-hardcoded-mysql-password
          )

          missing=0
          for rule in "${expected[@]}"; do
            if grep -q "\"RuleID\": *\"${rule}\"" "$RUNNER_TEMP/findings.json"; then
              echo "OK: rule '${rule}' triggered on fixtures."
            else
              echo "::error::rule '${rule}' did NOT trigger on fixtures. Ruleset regression."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then exit 1; fi

      - name: Assertion 2 — allowlist fixture must NOT trigger any rule
        shell: bash
        run: |
          set -euo pipefail
          GL="$RUNNER_TEMP/gl/gitleaks"
          CFG="templates/secret-hygiene/.gitleaks.toml.template"

          # Scan ONLY the allowlist fixture.
          mkdir -p "$RUNNER_TEMP/allowlist-only"
          cp tests/secret-scan-fixtures/allowlist-placeholder.env \
             "$RUNNER_TEMP/allowlist-only/"

          set +e
          "$GL" detect \
            --source "$RUNNER_TEMP/allowlist-only" \
            --config "$CFG" \
            --no-git \
            --no-banner \
            --report-format json \
            --report-path "$RUNNER_TEMP/allowlist-findings.json" \
            --redact \
            --exit-code 0
          set -e

          count=$(grep -c '"RuleID"' "$RUNNER_TEMP/allowlist-findings.json" || true)
          if [ "${count:-0}" = "0" ]; then
            echo "OK: allowlist fixture produced 0 findings."
          else
            echo "::error::allowlist fixture produced ${count} findings — allowlist regression."
            cat "$RUNNER_TEMP/allowlist-findings.json"
            exit 1
          fi

      - name: Assertion 3 — ignore patterns block session-log paths
        shell: bash
        run: |
          set -euo pipefail
          # This is a sanity check on gitignore.template, not gitleaks. We verify
          # the template at least mentions every path pattern we rely on, so the
          # gitignore block cannot silently drift out of sync with the test
          # fixtures above.
          required=(
            '.env'
            '.env.\*'
            '!.env.example'
            '\*\*/agent-transcripts/'
            '\*\*/session-logs/'
            '\*\*/state.backup-\*/'
            '\*\*/\*.jsonl.reset.\*'
            '\*.pem'
            'node_modules/'
            '.terraform/'
          )
          gi="templates/secret-hygiene/gitignore.template"
          missing=0
          for pat in "${required[@]}"; do
            # Use fixed-string grep on a de-escaped version of each expected pattern.
            raw=$(printf '%s' "$pat" | sed 's/\\//g')
            if grep -qF "$raw" "$gi"; then
              echo "OK: gitignore.template contains: $raw"
            else
              echo "::error::gitignore.template missing required pattern: $raw"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then exit 1; fi
